name = "l3-tc-template"
compatibility_date = "2026-05-26"
pages_build_output_dir = "dist"

# For Cloudflare Pages, create a dedicated TC Template D1 database first, then bind it as DB.
# Replace database_id with your own D1 Database ID before renaming this file to wrangler.toml.
[[d1_databases]]
binding = "DB"
database_name = "l3-tc-template-db"
database_id = "PUT_YOUR_D1_DATABASE_ID_HERE"
